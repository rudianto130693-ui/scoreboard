<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Scoreboard Hadangan Realtime</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #f59e0b; --red: #ef4444; --blue: #22c55e; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 800px; background: var(--card); padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .timer { font-size: 4rem; color: var(--accent); background: #000; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; }
        .teams { display: flex; gap: 20px; margin-bottom: 20px; }
        .team-card { flex: 1; padding: 20px; border-radius: 15px; background: rgba(0,0,0,0.2); border-top: 5px solid white; }
        .team-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        .score-big { font-size: 5rem; font-weight: 900; margin: 10px 0; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .btn-add { background: #10b981; } .btn-sub { background: #f43f5e; }
        .btn-timer { background: var(--accent); color: black; margin: 5px; padding: 10px 20px; }
        .summary-box { background: #000; padding: 20px; border-radius: 15px; border: 2px solid var(--accent); margin-top: 20px; }
        .label { font-size: 0.8rem; color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="timer" id="timer-display">10:00</div>
    <div>
        <button class="btn-timer" onclick="toggleTimer()">START/PAUSE</button>
        <button class="btn-timer" onclick="resetTimer()">RESET TIME</button>
    </div>

    <div class="teams">
        <div class="team-card" style="border-color: var(--red);">
            <div class="team-name">TIM MERAH</div>
            <div class="label">Garis Depan</div>
            <div class="controls">
                <button class="btn-add" onclick="updateDB('A', 'depan', 1)">+</button>
                <button class="btn-sub" onclick="updateDB('A', 'depan', -1)">-</button>
            </div>
            <div class="label">Garis Belakang</div>
            <div class="controls">
                <button class="btn-add" onclick="updateDB('A', 'belakang', 1)">+</button>
                <button class="btn-sub" onclick="updateDB('A', 'belakang', -1)">-</button>
            </div>
        </div>

        <div class="team-card" style="border-color: var(--blue);">
            <div class="team-name">TIM BIRU</div>
            <div class="label">Garis Depan</div>
            <div class="controls">
                <button class="btn-add" onclick="updateDB('B', 'depan', 1)">+</button>
                <button class="btn-sub" onclick="updateDB('B', 'depan', -1)">-</button>
            </div>
            <div class="label">Garis Belakang</div>
            <div class="controls">
                <button class="btn-add" onclick="updateDB('B', 'belakang', 1)">+</button>
                <button class="btn-sub" onclick="updateDB('B', 'belakang', -1)">-</button>
            </div>
        </div>
    </div>

    <div class="summary-box">
        <div style="display: flex; justify-content: space-around;">
            <div><div class="label">TOTAL MERAH</div><div class="score-big" style="color: var(--red)" id="totalA">0</div></div>
            <div style="align-self: center; font-size: 2rem;">VS</div>
            <div><div class="label">TOTAL BIRU</div><div class="score-big" style="color: var(--blue)" id="totalB">0</div></div>
        </div>
    </div>
    <button onclick="resetScores()" style="background: #475569; margin-top: 20px;">RESET SEMUA SKOR</button>
</div>

<script>
    // MASUKKAN KONFIGURASI FIREBASE ANDA DI SINI
    const firebaseConfig = {
  apiKey: "AIzaSyAX6cMznHaMh4g-LqF04d5U_tMaC3CwkAo",
  authDomain: "scoreboard-hadang.firebaseapp.com",
  projectId: "scoreboard-hadang",
  storageBucket: "scoreboard-hadang.firebasestorage.app",
  messagingSenderId: "767895749448",
  appId: "1:767895749448:web:dfb8a737bb9f86628b697d",
  measurementId: "G-SPRRVP71JG"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Fungsi Update ke Cloud
    function updateDB(team, pos, val) {
        const ref = db.ref(`scores/${team}/${pos}`);
        ref.transaction((currentValue) => (currentValue || 0) + val < 0 ? 0 : (currentValue || 0) + val);
    }

    function resetScores() {
        if(confirm("Reset semua skor?")) db.ref('scores').set({ A: {depan:0, belakang:0}, B: {depan:0, belakang:0} });
    }

    // Mendengarkan Perubahan Data (Realtime)
    db.ref('scores').on('value', (snapshot) => {
        const data = snapshot.val() || { A: {depan:0, belakang:0}, B: {depan:0, belakang:0} };
        document.getElementById('totalA').innerText = (data.A.depan || 0) + (data.A.belakang || 0);
        document.getElementById('totalB').innerText = (data.B.depan || 0) + (data.B.belakang || 0);
    });

    // Timer Sync (Sederhana)
    let timerRunning = false;
    let timeLeft = 600;
    function toggleTimer() { timerRunning = !timerRunning; }
    function resetTimer() { timeLeft = 600; }
    setInterval(() => {
        if(timerRunning && timeLeft > 0) {
            timeLeft--;
            let m = Math.floor(timeLeft/60);
            let s = timeLeft%60;
            document.getElementById('timer-display').innerText = `${m}:${s<10?'0'+s:s}`;
        }
    }, 1000);
</script>
</body>
</html>
